name: Backend CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  lint:
    name: Lint (format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EPMS.sln

      - name: Check code format
        run: dotnet format EPMS.sln --verify-no-changes --severity warn

  test:
    name: Unit & Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EPMS.sln

      - name: Run unit tests
        run: dotnet test tests/EPMS.UnitTests/EPMS.UnitTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=unit-test-results.trx"

      # Integration test memakai Testcontainers, butuh akses Docker daemon
      # yang sudah tersedia secara default di runner ubuntu-latest GitHub Actions.
      - name: Run integration tests
        run: dotnet test tests/EPMS.IntegrationTests/EPMS.IntegrationTests.csproj --no-restore --configuration Release --logger "trx;LogFileName=integration-test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EPMS.sln

      - name: Build solution (Release)
        run: dotnet build EPMS.sln --no-restore --configuration Release

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: epms-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
