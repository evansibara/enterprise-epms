server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback ke index.html untuk semua route — wajib untuk SPA dengan
    # client-side routing (React Router dkk), supaya refresh/akses langsung
    # ke path seperti /projects/123 tidak menghasilkan 404 dari Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis hasil build Vite (sudah ada content-hash di nama file,
    # jadi aman di-cache lama).
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
